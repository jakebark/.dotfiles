# node and go provide the runtimes Mason needs to install LSP servers
# (node: jsonls, yamlls, dockerls, vimls / go: gopls)
- name: nvim brew
  homebrew:
    name: [ "neovim", "lua@5.4", "luarocks", "ripgrep", "node", "go" ]
    state: present
  tags:
    - nvim

-  name: nvim exists
   stat:
     path: ~/.config/nvim
   register: nvim 
   tags:
    - nvim

- name: nvim clone
  command: git -C ~/.config clone https://github.com/jakebark/nvim.git
  when: nvim.stat.exists == False
  tags:
    - nvim

- name: nvim pull
  command: git -C ~/.config/nvim pull
  when: nvim.stat.exists == True
  tags:
    - nvim
